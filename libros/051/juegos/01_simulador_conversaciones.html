<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Conversaciones 💬</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4CAF50 0%, #2E7D32 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4CAF50, #2E7D32);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.2em;
            margin-bottom: 10px;
        }

        .chat-container {
            padding: 30px;
            min-height: 400px;
        }

        .scenario {
            background: #E8F5E9;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid #4CAF50;
        }

        .message {
            margin: 15px 0;
            padding: 15px;
            border-radius: 10px;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.other {
            background: #f5f5f5;
            margin-right: 20%;
        }

        .message.user {
            background: #4CAF50;
            color: white;
            margin-left: 20%;
            text-align: right;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        .option-btn {
            padding: 15px;
            border: 2px solid #4CAF50;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
            font-size: 1em;
        }

        .option-btn:hover {
            background: #E8F5E9;
            transform: translateX(5px);
        }

        .option-btn.correct {
            background: #4CAF50;
            color: white;
            border-color: #2E7D32;
        }

        .option-btn.incorrect {
            background: #ffebee;
            border-color: #f44336;
        }

        .feedback {
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
            display: none;
        }

        .feedback.show {
            display: block;
            animation: fadeIn 0.5s;
        }

        .feedback.positive {
            background: #E8F5E9;
            border-left: 4px solid #4CAF50;
        }

        .feedback.negative {
            background: #FFEBEE;
            border-left: 4px solid #f44336;
        }

        .score {
            text-align: center;
            font-size: 1.5em;
            color: #4CAF50;
            margin: 20px 0;
            font-weight: bold;
        }

        .next-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1em;
            display: block;
            margin: 20px auto;
            transition: all 0.3s;
        }

        .next-btn:hover {
            background: #45a049;
            transform: scale(1.05);
        }

        .principle {
            background: #FFF9C4;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            border-left: 4px solid #FBC02D;
        }

        .principle strong {
            color: #F57F17;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>💬 Simulador de Conversaciones</h1>
            <p>Practica los principios de Dale Carnegie en situaciones reales</p>
        </div>

        <div class="chat-container">
            <div class="score">Puntuación: <span id="score">0</span> / <span id="total">0</span></div>

            <div id="scenario-container"></div>
            <div id="chat-messages"></div>
            <div id="options-container"></div>
            <div id="feedback" class="feedback"></div>

            <button id="next-btn" class="next-btn" style="display: none;">Siguiente Escenario →</button>
        </div>
    </div>

    <script>
        let currentScenario = 0;
        let score = 0;
        let answered = false;

        const scenarios = [
            {
                title: "El Compañero de Trabajo Crítico",
                context: "Tu compañero de trabajo acaba de cometer un error en un proyecto importante.",
                otherMessage: "No puedo creer que cometí ese error. Ahora todo el proyecto se retrasará.",
                options: [
                    {
                        text: "No te preocupes, todos cometemos errores. ¿Cómo puedo ayudarte a solucionarlo?",
                        correct: true,
                        principle: "No Critiques ni Condenes",
                        feedback: "¡Excelente! En lugar de criticar, mostraste empatía y ofreciste ayuda. Esto fortalece la relación y motiva a la persona a mejorar."
                    },
                    {
                        text: "Te dije que tuvieras más cuidado. Ahora tendremos que trabajar horas extra.",
                        correct: false,
                        principle: "Violación: Crítica",
                        feedback: "La crítica solo genera resentimiento y defensiva. No ayuda a solucionar el problema y daña la relación."
                    },
                    {
                        text: "Bueno, al menos no soy yo quien cometió el error esta vez.",
                        correct: false,
                        principle: "Violación: Falta de Empatía",
                        feedback: "Esto hace que la persona se sienta peor y no ofrece ninguna solución constructiva."
                    }
                ]
            },
            {
                title: "El Cliente Insatisfecho",
                context: "Un cliente está molesto porque su pedido llegó tarde.",
                otherMessage: "¡Esto es inaceptable! Prometieron entrega en 2 días y han pasado 5.",
                options: [
                    {
                        text: "Entiendo completamente su frustración. Si yo estuviera en su lugar, me sentiría exactamente igual. Déjeme ver cómo puedo resolver esto inmediatamente.",
                        correct: true,
                        principle: "Simpatiza con las Ideas del Otro",
                        feedback: "¡Perfecto! Validaste sus sentimientos antes de ofrecer soluciones. Esto desarma la hostilidad y abre el diálogo."
                    },
                    {
                        text: "No es mi culpa. El departamento de envíos es el responsable.",
                        correct: false,
                        principle: "Violación: Evasión de Responsabilidad",
                        feedback: "Esto solo frustra más al cliente. Aunque no sea tu culpa directa, debes asumir la responsabilidad de ayudar."
                    },
                    {
                        text: "Otros clientes han esperado más tiempo y no se quejan tanto.",
                        correct: false,
                        principle: "Violación: Minimizar Sentimientos",
                        feedback: "Nunca minimices los sentimientos de alguien. Esto solo aumenta su frustración."
                    }
                ]
            },
            {
                title: "El Jefe Exigente",
                context: "Tu jefe te pide que trabajes el fin de semana en un proyecto urgente.",
                otherMessage: "Necesito que vengas este sábado. Es urgente y solo confío en que tú lo hagas bien.",
                options: [
                    {
                        text: "Aprecio mucho su confianza en mí. Tenía planes familiares, pero entiendo la urgencia. ¿Podríamos explorar si hay alguna forma de completarlo el viernes trabajando unas horas extra?",
                        correct: true,
                        principle: "Aprecio + Buscar Soluciones",
                        feedback: "¡Excelente! Reconociste el cumplido, fuiste honesto sobre tus limitaciones, y ofreciste una alternativa constructiva."
                    },
                    {
                        text: "No puedo. Tengo planes y ya trabajo demasiado.",
                        correct: false,
                        principle: "Violación: Confrontación Directa",
                        feedback: "Aunque es válido tener límites, la forma confrontacional puede dañar la relación. Hay formas más diplomáticas de establecer límites."
                    },
                    {
                        text: "Está bien, vendré.",
                        correct: false,
                        principle: "Violación: No Expresar Necesidades",
                        feedback: "Aunque parece cooperativo, no expresar tus necesidades puede llevar a resentimiento y agotamiento a largo plazo."
                    }
                ]
            },
            {
                title: "El Amigo que Necesita Consejo",
                context: "Tu amigo está considerando renunciar a su trabajo sin tener otro empleo asegurado.",
                otherMessage: "Estoy harto de mi trabajo. Creo que voy a renunciar mañana mismo.",
                options: [
                    {
                        text: "Entiendo que estés frustrado. Cuéntame más sobre lo que está pasando. ¿Qué es lo que más te molesta?",
                        correct: true,
                        principle: "Escucha Activa + Interés Genuino",
                        feedback: "¡Perfecto! En lugar de dar consejo inmediato, escuchaste primero. Las personas necesitan ser escuchadas antes de estar listas para recibir consejo."
                    },
                    {
                        text: "Eso sería una locura. No puedes renunciar sin tener otro trabajo.",
                        correct: false,
                        principle: "Violación: Crítica Directa",
                        feedback: "Aunque tu consejo puede ser sensato, la forma directa hace que la persona se ponga defensiva y no escuche."
                    },
                    {
                        text: "Yo también odio mi trabajo. La vida laboral es terrible.",
                        correct: false,
                        principle: "Violación: Hacer sobre Ti",
                        feedback: "Tu amigo necesita ser escuchado, no que hables de ti. Mantén el enfoque en sus necesidades."
                    }
                ]
            },
            {
                title: "El Nuevo en el Equipo",
                context: "Un nuevo miembro del equipo parece tímido y no participa en las reuniones.",
                otherMessage: "*Permanece en silencio durante toda la reunión*",
                options: [
                    {
                        text: "Me gustaría escuchar tu perspectiva sobre esto. Tu experiencia en [área específica] sería muy valiosa para el equipo.",
                        correct: true,
                        principle: "Hacer Sentir Importante + Específico",
                        feedback: "¡Excelente! Le diste una razón específica por la que su opinión es valiosa, lo que hace más fácil que participe."
                    },
                    {
                        text: "¿Por qué nunca dices nada? Necesitamos que participes más.",
                        correct: false,
                        principle: "Violación: Crítica Pública",
                        feedback: "Esto puede avergonzar a la persona y hacer que se cierre aún más. Nunca critiques públicamente."
                    },
                    {
                        text: "*Ignorar su silencio y continuar*",
                        correct: false,
                        principle: "Violación: Falta de Inclusión",
                        feedback: "Ignorar a alguien hace que se sienta invisible e invaluado. Todos necesitan sentirse incluidos."
                    }
                ]
            }
        ];

        function loadScenario() {
            if (currentScenario >= scenarios.length) {
                showFinalScore();
                return;
            }

            answered = false;
            const scenario = scenarios[currentScenario];

            document.getElementById('scenario-container').innerHTML = `
                <div class="scenario">
                    <h3>${scenario.title}</h3>
                    <p>${scenario.context}</p>
                </div>
            `;

            document.getElementById('chat-messages').innerHTML = `
                <div class="message other">${scenario.otherMessage}</div>
            `;

            const optionsHtml = scenario.options.map((option, index) => `
                <button class="option-btn" onclick="selectOption(${index})">${option.text}</button>
            `).join('');

            document.getElementById('options-container').innerHTML = `
                <div class="options">${optionsHtml}</div>
            `;

            document.getElementById('feedback').className = 'feedback';
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('total').textContent = scenarios.length;
        }

        function selectOption(index) {
            if (answered) return;
            answered = true;

            const scenario = scenarios[currentScenario];
            const option = scenario.options[index];
            const buttons = document.querySelectorAll('.option-btn');

            buttons[index].classList.add(option.correct ? 'correct' : 'incorrect');
            buttons.forEach(btn => btn.style.pointerEvents = 'none');

            if (option.correct) {
                score++;
                document.getElementById('score').textContent = score;
            }

            const feedback = document.getElementById('feedback');
            feedback.className = `feedback show ${option.correct ? 'positive' : 'negative'}`;
            feedback.innerHTML = `
                <h4>${option.correct ? '✅ ¡Excelente!' : '❌ No es la mejor opción'}</h4>
                <p>${option.feedback}</p>
                <div class="principle">
                    <strong>Principio:</strong> ${option.principle}
                </div>
            `;

            document.getElementById('next-btn').style.display = 'block';
        }

        function nextScenario() {
            currentScenario++;
            loadScenario();
        }

        function showFinalScore() {
            const percentage = (score / scenarios.length * 100).toFixed(0);
            let message = '';

            if (percentage >= 80) {
                message = '¡Excelente! Dominas los principios de Carnegie.';
            } else if (percentage >= 60) {
                message = '¡Bien! Vas por buen camino. Sigue practicando.';
            } else {
                message = 'Sigue aprendiendo. Revisa las lecciones y vuelve a intentarlo.';
            }

            document.getElementById('scenario-container').innerHTML = `
                <div class="scenario">
                    <h2 style="text-align: center; color: #4CAF50;">🎉 ¡Completado!</h2>
                    <div style="text-align: center; font-size: 3em; margin: 20px 0;">${percentage}%</div>
                    <h3 style="text-align: center;">${message}</h3>
                    <p style="text-align: center; margin-top: 20px;">
                        Puntuación: ${score} de ${scenarios.length}
                    </p>
                    <button class="next-btn" onclick="location.reload()">Reiniciar Simulador</button>
                </div>
            `;
            document.getElementById('chat-messages').innerHTML = '';
            document.getElementById('options-container').innerHTML = '';
            document.getElementById('feedback').className = 'feedback';
            document.getElementById('next-btn').style.display = 'none';
        }

        document.getElementById('next-btn').addEventListener('click', nextScenario);
        loadScenario();
    </script>
</body>

</html>
